<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Echo Chat</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Heebo&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="chat.css">
  <script src="chat.js" defer></script>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header flex items-center justify-between shadow-md" id="mainChatHeader" style="transition: background-color 0.3s ease;">
      <button class="hamburger" id="menuButton">☰</button>
      
      <button class="back-button" onclick="window.location.href='SelectSubjects.html'">
      <svg xmlns="http://www.w3.org/2000/svg" class="lucide lucide-arrow-left" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: scaleX(-1);">
        <path d="M19 12H5" />
        <path d="M12 19l-7-7 7-7" />
      </svg>
      </button>
      
      <div id="titleContainer" class="flex items-center gap-2 cursor-pointer bg-black/10 hover:bg-black/20 px-4 py-1.5 rounded-full transition-all text-white" title="לחץ למידע נוסף">
          <h2 class="chat-topic-title m-0 text-lg font-bold" id="headerTitle">טוען...</h2>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
      </div>

      <div class="menu" id="menu">
        <button class="text-gray-800 text-right w-full" onclick="window.location.href='chat.html?topic=Legal_reform'">הרפורמה המשפטית</button>
        <button class="text-gray-800 text-right w-full" onclick="window.location.href='chat.html?topic=Bibi_trial'">תיקי נתניהו</button>
        <button class="text-gray-800 text-right w-full" onclick="window.location.href='chat.html?topic=Elections_2026'">בחירות לכנסת 2026</button>
        <button class="text-gray-800 text-right w-full" onclick="window.location.href='chat.html?topic=Recruitment_law'">חוק הגיוס</button>
      </div>
    </div> 
    <div class="flex justify-center gap-4 py-3 bg-[#f0eedf] border-b border-gray-300 shadow-sm relative z-10">
      <button id="showAllBtn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg font-semibold hover:bg-gray-300 transition">
        כל ההודעות
      </button>
      <button id="showMineBtn" class="bg-[#315769] text-white px-4 py-2 rounded-lg font-semibold hover:bg-[#274a59] transition">
        ההודעות שלי
      </button>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div id="messageOptions" style="display:none"></div>

    <div class="chat-input-area">
      <input type="text" dir="rtl" id="chatInput" placeholder="הוסף תגובה...">
      <button id="sendButton">שלח</button>
    </div>
  </div>

  <div id="topicModal" class="fixed inset-0 bg-black/60 z-50 hidden flex justify-center items-center backdrop-blur-sm transition-opacity">
      <div class="bg-white rounded-2xl p-6 w-11/12 max-w-md shadow-2xl transform transition-all text-right border-t-8" id="modalContentBox">
          <div class="flex justify-between items-center mb-4">
              <h3 class="text-2xl font-bold text-gray-800" id="modalTitle">כותרת</h3>
              <button id="closeModalBtn" class="text-gray-400 hover:text-gray-700 transition bg-gray-100 hover:bg-gray-200 rounded-full p-2">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>
              </button>
          </div>
          <p class="text-gray-600 leading-relaxed text-lg" id="modalDesc">תיאור...</p>
      </div>
  </div>

</body>
</html>
